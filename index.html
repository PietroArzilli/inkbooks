<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INK BOOKS | Tattoo Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f4f3f0;
    --surface:   #ffffff;
    --surface2:  #f9f8f6;
    --border:    #e2e0db;
    --border2:   #ccc9c2;
    --text:      #1a1916;
    --text2:     #6b6860;
    --text3:     #9e9b96;
    --green:     #1a7a4a;
    --green-bg:  #edf7f1;
    --green-bd:  #b8dfc8;
    --red:       #c0392b;
    --red-bg:    #fdf2f1;
    --red-bd:    #f0c4bf;
    --accent:    #1a1916;
    --radius:    10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* Overlay Configurazione Iniziale */
  #setup-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center;
  }
  .setup-card {
    background: var(--surface); padding: 2rem; border-radius: var(--radius);
    border: 1px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area { display: flex; align-items: center; gap: 15px; }
  .logo { font-family: 'Instrument Serif', serif; font-size: 1.5rem; color: var(--text); letter-spacing: -0.01em; }
  .logo em { font-style: italic; color: var(--text2); }

  .header-right { display: flex; align-items: center; gap: 1rem; }
  .nav-month { display: flex; align-items: center; gap: 0.5rem; }

  .nav-btn {
    background: none; border: 1px solid var(--border); color: var(--text2);
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  #month-label { font-family: 'Geist Mono', monospace; font-size: 0.78rem; min-width: 148px; text-align: center; font-weight: 600; }

  .btn-action {
    display: flex; align-items: center; gap: 0.4rem; padding: 0.45rem 0.9rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; font-size: 0.72rem; font-weight: 500;
  }

  .stats-strip { background: var(--surface); border-bottom: 1px solid var(--border); display: grid; grid-template-columns: repeat(5, 1fr); }
  .stat-card { padding: 1.25rem 1.5rem; border-right: 1px solid var(--border); }
  .stat-card:last-child { border-right: none; }
  .stat-label { font-size: 0.7rem; color: var(--text3); margin-bottom: 0.4rem; text-transform: uppercase; }
  .stat-value { font-family: 'Geist Mono', monospace; font-size: 1.5rem; font-weight: 600; line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-sub { font-size: 0.68rem; color: var(--text3); margin-top: 0.3rem; font-family: 'Geist Mono', monospace; }

  .app-wrapper { max-width: 1160px; margin: 0 auto; padding: 1.75rem 2rem; display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; }
  @media (max-width: 900px) { .app-wrapper { grid-template-columns: 1fr; padding: 1rem; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .card-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 0.72rem; font-weight: 600; color: var(--text2); text-transform: uppercase; }

  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; padding: 1rem; }
  .day-label { text-align: center; font-size: 0.62rem; font-weight: 600; color: var(--text3); padding: 0.35rem 0; text-transform: uppercase; }
  .day-cell { aspect-ratio: 1; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--surface2); position: relative; }
  .day-cell.empty { border-color: transparent; background: transparent; cursor: default; }
  .day-cell.selected { border-color: var(--text); background: var(--text); }
  .day-cell.selected .day-num { color: #fff; }
  .day-num { font-family: 'Geist Mono', monospace; font-size: 0.72rem; color: var(--text2); }
  .day-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 3px; }
  .has-income .day-dot { background: var(--green); }
  .has-cost .day-dot { background: var(--red); }

  .entry-panel { display: flex; flex-direction: column; gap: 1.25rem; }
  .form-body { padding: 1.25rem; }
  .tab-row { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 1.25rem; background: var(--bg); }
  .tab-btn { flex: 1; padding: 0.55rem; background: none; border: none; cursor: pointer; font-size: 0.75rem; font-weight: 500; color: var(--text3); }
  .tab-btn.active.income { background: var(--surface); color: var(--green); }
  .tab-btn.active.expense { background: var(--surface); color: var(--red); }

  .form-group { margin-bottom: 0.9rem; }
  .form-label { display: block; font-size: 0.68rem; font-weight: 600; color: var(--text2); margin-bottom: 0.35rem; text-transform: uppercase; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 0.8rem; font-family: 'Geist', sans-serif; font-size: 0.88rem; outline: none; }
  
  .tax-toggle { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; cursor: pointer; }
  .tax-toggle input { cursor: pointer; width: 14px; height: 14px; }
  .tax-toggle span { font-size: 0.75rem; color: var(--text2); font-weight: 500; }

  .btn-add { width: 100%; padding: 0.65rem; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 0.8rem; }
  .btn-add.income { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
  .btn-add.expense { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-bd); }

  .entry-list { display: flex; flex-direction: column; gap: 0.4rem; padding: 0 1.25rem 1.25rem; max-height: 200px; overflow-y: auto; }
  .entry-item { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.82rem; }
  .entry-item.income { background: var(--green-bg); border: 1px solid var(--green-bd); }
  .entry-item.expense { background: var(--red-bg); border: 1px solid var(--red-bd); }
  .entry-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 1.1rem; }

  .calc-row { display: flex; justify-content: space-between; padding: 0.65rem 1.25rem; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .calc-total { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; background: var(--surface2); }
  .calc-total-val { font-family: 'Geist Mono', monospace; font-size: 1.1rem; font-weight: 600; }

  .expense-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .expense-table th { font-size: 0.65rem; color: var(--text3); padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .expense-table td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); }
  .badge { padding: 0.18rem 0.5rem; border-radius: 4px; font-size: 0.62rem; font-weight: 600; }
  .badge.income { background: var(--green-bg); color: var(--green); }
  .badge.expense { background: var(--red-bg); color: var(--red); }
  .mono { font-family: 'Geist Mono', monospace; }

  #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #fff; padding: 0.65rem 1.1rem; border-radius: var(--radius-sm); opacity: 0; transition: 0.25s; z-index: 1001;}
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="setup-overlay" style="display:none">
  <div class="setup-card">
    <h2 style="font-family:'Instrument Serif'; font-size:1.8rem; margin-bottom:1rem">Configurazione App</h2>
    <div class="form-group">
      <label class="form-label">Quota Studio (%)</label>
      <input type="number" id="cfg-studio" class="form-input" placeholder="es. 30">
    </div>
    <div class="form-group">
      <label class="form-label">Tua Aliquota Tasse (%)</label>
      <input type="number" id="cfg-tax" class="form-input" placeholder="es. 5">
    </div>
    <button class="btn-add income" onclick="saveSettings()">Salva e Inizia</button>
  </div>
</div>

<header>
  <div class="logo-area">
    <div class="logo">Ink<em>Books</em></div>
    <button class="btn-action" style="padding: 0.2rem 0.5rem; font-size: 0.6rem;" onclick="showSettings()">⚙️ Modifica %</button>
  </div>
  <div class="header-right">
    <div class="nav-month">
      <button class="nav-btn" onclick="changeMonth(-1)">←</button>
      <div id="month-label">—</div>
      <button class="nav-btn" onclick="changeMonth(1)">→</button>
    </div>
    <button class="btn-action" onclick="exportData()">Export JSON</button>
    <button class="btn-action" onclick="document.getElementById('import-input').click()">Import</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</header>

<div class="stats-strip">
  <div class="stat-card">
    <div class="stat-label">Totale incassato</div>
    <div class="stat-value green" id="s-gross">€0</div>
    <div class="stat-sub">Lordo clienti</div>
  </div>
  <div class="stat-card">
    <div class="stat-label" id="label-studio">Allo studio (--)</div>
    <div class="stat-value red" id="s-studio">€0</div>
    <div class="stat-sub">Quota studio</div>
  </div>
  <div class="stat-card">
    <div class="stat-label" id="label-tax">Tasse (--)</div>
    <div class="stat-value red" id="s-tax">€0</div>
    <div class="stat-sub">Sulle voci tassabili</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Spese</div>
    <div class="stat-value red" id="s-costs">€0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Netto in tasca</div>
    <div class="stat-value" id="s-net">€0</div>
  </div>
</div>

<div class="app-wrapper">
  <div class="card">
    <div class="card-header"><span class="card-title">Calendario</span></div>
    <div class="month-grid" id="month-grid"></div>
  </div>

  <div class="entry-panel">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Aggiungi</span>
        <span id="selected-day-display" style="font-size:0.75rem; font-weight:600; color:var(--text2)">—</span>
      </div>
      <div class="form-body">
        <div class="tab-row">
          <button class="tab-btn active income" id="tab-income" onclick="switchTab('income')">Entrata</button>
          <button class="tab-btn expense" id="tab-expense" onclick="switchTab('expense')">Uscita</button>
        </div>
        
        <div id="form-income">
          <div class="form-group">
            <label class="form-label">Importo (€)</label>
            <input class="form-input" type="number" id="inc-amount" placeholder="0.00">
            <label class="tax-toggle">
              <input type="checkbox" id="inc-taxable" checked>
              <span id="label-tax-check">Applica tasse</span>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">Descrizione</label>
            <input class="form-input" type="text" id="inc-desc" placeholder="es. Sessione schiena">
          </div>
          <button class="btn-add income" onclick="addEntry('income')">+ Aggiungi</button>
        </div>

        <div id="form-expense" style="display:none">
          <div class="form-group">
            <label class="form-label">Importo (€)</label>
            <input class="form-input" type="number" id="exp-amount" placeholder="0.00">
          </div>
          <div class="form-group">
            <label class="form-label">Descrizione spesa</label>
            <input class="form-input" type="text" id="exp-desc" placeholder="es. Aghi e tubi">
          </div>
          <button class="btn-add expense" onclick="addEntry('expense')">+ Aggiungi</button>
        </div>
      </div>
      <div class="entry-list" id="entry-list"></div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Riepilogo</span></div>
      <div class="calc-row"><span>Lordo</span><span id="c-gross" class="mono">€0</span></div>
      <div class="calc-row"><span>− Studio</span><span id="c-studio" class="mono red">€0</span></div>
      <div class="calc-row"><span>− Tasse</span><span id="c-tax" class="mono red">€0</span></div>
      <div class="calc-row"><span>− Spese</span><span id="c-costs" class="mono red">€0</span></div>
      <div class="calc-total"><span>Netto</span><span id="c-net" class="calc-total-val">€0</span></div>
    </div>
  </div>

  <div class="card log-card">
    <div class="card-header"><span class="card-title">Log Mensile</span></div>
    <div style="overflow-x:auto">
      <table class="expense-table">
        <thead>
          <tr><th>Data</th><th>Tipo</th><th>Descrizione</th><th>Tasse?</th><th style="text-align:right">Importo</th><th></th></tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast">Salvato</div>

<script>
// --- GESTIONE PERCENTUALI PERSONALIZZATE ---
let STUDIO_PCT = 0;
let TAX_PCT = 0;
const SETTINGS_KEY = 'inkbooks_settings';
const STORAGE_KEY = 'inkbooks_v2';

function checkSettings() {
    const saved = localStorage.getItem(SETTINGS_KEY);
    if (saved) {
        const settings = JSON.parse(saved);
        STUDIO_PCT = settings.studio / 100;
        TAX_PCT = settings.tax / 100;
        document.getElementById('setup-overlay').style.display = 'none';
        updateLabels();
    } else {
        document.getElementById('setup-overlay').style.display = 'flex';
    }
}

function saveSettings() {
    const s = document.getElementById('cfg-studio').value;
    const t = document.getElementById('cfg-tax').value;
    if (!s || !t) return alert("Inserisci entrambi i valori!");

    const settings = { studio: parseFloat(s), tax: parseFloat(t) };
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    checkSettings();
    render();
}

function showSettings() {
    const saved = localStorage.getItem(SETTINGS_KEY);
    if (saved) {
        const settings = JSON.parse(saved);
        document.getElementById('cfg-studio').value = settings.studio;
        document.getElementById('cfg-tax').value = settings.tax;
    }
    document.getElementById('setup-overlay').style.display = 'flex';
}

function updateLabels() {
    document.getElementById('label-studio').textContent = `Allo studio (${(STUDIO_PCT*100).toFixed(0)}%)`;
    document.getElementById('label-tax').textContent = `Tasse (${(TAX_PCT*100).toFixed(0)}%)`;
    document.getElementById('label-tax-check').textContent = `Applica tasse (${(TAX_PCT*100).toFixed(0)}%)`;
}

// --- LOGICA ORIGINALE INTEGRATA ---
let allData = {};
let currentYear, currentMonth, selectedDay;

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  allData = saved ? JSON.parse(saved) : {};
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
  showToast("Dati aggiornati");
}

function exportData() {
  const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `inkbooks-backup.json`;
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    allData = JSON.parse(e.target.result);
    saveData();
    render();
  };
  reader.readAsText(file);
}

function monthKey() { return `${currentYear}-${currentMonth}`; }
function getDayData(day) {
  const mk = monthKey();
  if (!allData[mk]) allData[mk] = {};
  if (!allData[mk][day]) allData[mk][day] = { incomes: [], expenses: [] };
  return allData[mk][day];
}

window.onload = () => {
  checkSettings(); // Controlla le % per prime
  loadData();
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  selectedDay = now.getDate();
  render();
};

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  selectedDay = 1;
  render();
}

function switchTab(tab) {
  document.getElementById('form-income').style.display = tab === 'income' ? 'block' : 'none';
  document.getElementById('form-expense').style.display = tab === 'expense' ? 'block' : 'none';
  document.getElementById('tab-income').className = `tab-btn ${tab === 'income' ? 'active income' : ''}`;
  document.getElementById('tab-expense').className = `tab-btn ${tab === 'expense' ? 'active expense' : ''}`;
}

function addEntry(type) {
  const amtEl = document.getElementById(type === 'income' ? 'inc-amount' : 'exp-amount');
  const descEl = document.getElementById(type === 'income' ? 'inc-desc' : 'exp-desc');
  const taxEl = document.getElementById('inc-taxable');
  const val = parseFloat(amtEl.value);
  if(!val) return;

  const dd = getDayData(selectedDay);
  const entry = {
    id: Date.now().toString(),
    amount: val,
    desc: descEl.value,
    isTaxable: type === 'income' ? taxEl.checked : false
  };

  dd[type === 'income' ? 'incomes' : 'expenses'].push(entry);
  amtEl.value = ''; descEl.value = '';
  saveData();
  render();
}

function deleteEntry(type, id, day) {
  const dd = getDayData(day);
  const key = type === 'income' ? 'incomes' : 'expenses';
  dd[key] = dd[key].filter(e => e.id !== id);
  saveData();
  render();
}

function render() {
  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  document.getElementById('month-label').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  renderCalendar();
  renderSelectedDay();
  updateStats();
  renderLog();
}

function renderCalendar() {
  const grid = document.getElementById('month-grid');
  grid.innerHTML = '';
  ['L','M','M','G','V','S','D'].forEach(d => {
    const el = document.createElement('div'); el.className = 'day-label'; el.textContent = d; grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  for (let i = 0; i < offset; i++) grid.appendChild(Object.assign(document.createElement('div'), {className:'day-cell empty'}));

  for (let d = 1; d <= daysInMonth; d++) {
    const dd = getDayData(d);
    const el = document.createElement('div');
    el.className = `day-cell ${d === selectedDay ? 'selected' : ''} ${dd.incomes.length ? 'has-income' : ''} ${dd.expenses.length ? 'has-cost' : ''}`;
    el.innerHTML = `<div class="day-num">${d}</div><div class="day-dot"></div>`;
    el.onclick = () => { selectedDay = d; render(); };
    grid.appendChild(el);
  }
}

function renderSelectedDay() {
  const dd = getDayData(selectedDay);
  document.getElementById('selected-day-display').textContent = `${selectedDay}/${currentMonth + 1}`;
  const list = document.getElementById('entry-list');
  const all = [...dd.incomes.map(i=>({...i, type:'income'})), ...dd.expenses.map(e=>({...e, type:'expense'}))];
  
  list.innerHTML = all.map(e => `
    <div class="entry-item ${e.type}">
      <span>${e.desc || (e.type === 'income' ? 'Entrata' : 'Spesa')}</span>
      <div style="display:flex; align-items:center; gap:10px">
        <span class="mono">€${e.amount.toFixed(2)}</span>
        <button class="entry-del" onclick="deleteEntry('${e.type}','${e.id}',${selectedDay})">×</button>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  const m = allData[monthKey()] || {};
  let gross = 0, costs = 0, taxableGross = 0;

  Object.values(m).forEach(d => {
    d.incomes.forEach(i => {
      gross += i.amount;
      if (i.isTaxable !== false) taxableGross += i.amount;
    });
    d.expenses.forEach(e => costs += e.amount);
  });

  const studio = gross * STUDIO_PCT;
  const tax = taxableGross * TAX_PCT;
  const net = gross - studio - tax - costs;

  document.getElementById('s-gross').textContent = `€${gross.toFixed(2)}`;
  document.getElementById('s-studio').textContent = `€${studio.toFixed(2)}`;
  document.getElementById('s-tax').textContent = `€${tax.toFixed(2)}`;
  document.getElementById('s-costs').textContent = `€${costs.toFixed(2)}`;
  document.getElementById('s-net').textContent = `€${net.toFixed(2)}`;
  
  document.getElementById('c-gross').textContent = `€${gross.toFixed(2)}`;
  document.getElementById('c-studio').textContent = `-€${studio.toFixed(2)}`;
  document.getElementById('c-tax').textContent = `-€${tax.toFixed(2)}`;
  document.getElementById('c-costs').textContent = `-€${costs.toFixed(2)}`;
  document.getElementById('c-net').textContent = `€${net.toFixed(2)}`;
}

function renderLog() {
  const m = allData[monthKey()] || {};
  const tbody = document.getElementById('log-tbody');
  let rows = [];
  Object.keys(m).sort((a,b)=>a-b).forEach(d => {
    m[d].incomes.forEach(i => rows.push({day:d, type:'income', ...i}));
    m[d].expenses.forEach(e => rows.push({day:d, type:'expense', ...e}));
  });

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="mono">${r.day}/${currentMonth+1}</td>
      <td><span class="badge ${r.type}">${r.type === 'income' ? 'Entrata' : 'Uscita'}</span></td>
      <td>${r.desc || '—'}</td>
      <td class="mono">${r.type === 'income' ? (r.isTaxable ? 'Sì' : 'No') : '—'}</td>
      <td style="text-align:right" class="mono">€${r.amount.toFixed(2)}</td>
      <td><button class="entry-del" onclick="deleteEntry('${r.type}','${r.id}',${r.day})">×</button></td>
    </tr>
  `).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
